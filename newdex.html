<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MySQL Views Demonstration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        .section {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: #34495e;
            margin-bottom: 20px;
        }

        .image-block {
            text-align: center;
            margin-bottom: 20px;
        }

        .image-block img {
            max-width: 100%;
            height: auto;   /* Prevent distortion */
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .label {
            font-weight: bold;
            margin: 15px 0 8px;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<h1>MySQL Views Demonstration</h1>

<div class="section">
